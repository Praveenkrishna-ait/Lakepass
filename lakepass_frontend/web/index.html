  <meta charset="UTF-8">

  <meta name="google-signin-client_id" content="643698625321-3i1k5h9gdrt3ne1hheub2fbdgcmdmd34.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="lakepass_frontend">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>LakePass - Marina Booking</title>
  <link rel="manifest" href="manifest.json">

  <!-- Razorpay Checkout Script -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <script>
    // This function is called from Dart via JS interop
    function openRazorpayCheckout(options) {
      var rzp = new Razorpay({
        key: options.key,
        amount: options.amount,
        currency: options.currency,
        name: 'LakePass',
        description: options.description,
        order_id: options.order_id,
        prefill: {
          name: options.prefill_name || '',
          email: options.prefill_email || '',
        },
        theme: {
          color: '#38BDF8',
        },
        handler: function(response) {
          // On payment success, call the Dart callback
          if (options.onSuccess) {
            options.onSuccess(
              response.razorpay_order_id,
              response.razorpay_payment_id,
              response.razorpay_signature
            );
          }
        },
        modal: {
          ondismiss: function() {
            if (options.onCancel) {
              options.onCancel();
            }
          }
        }
      });
      rzp.on('payment.failed', function(response) {
        if (options.onError) {
          options.onError(response.error.description);
        }
      });
      rzp.open();
    }
  </script>
</head>
<body>
  <!--

</body>
